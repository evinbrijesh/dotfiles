# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
#env = GDK_SCALE,2
#monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
#env = GDK_SCALE,1
#monitor=eDP-1,preferred,auto,1

#monitor=HDMI-A-1,preferred,auto,1,mirror,eDP-1

# --- HOME MODE (DUAL MONITOR) ---
# 1. External Monitor: LG UltraGear (TOP)
# Set to 1920x1080 at 120Hz, positioned at the origin (0,0)
monitor=HDMI-A-1, 1920x1080@120, 0x0, 1

# 2. Laptop Monitor: BOE (BOTTOM)
# Set to 1920x1080 at 60Hz, positioned exactly below the LG (1080 pixels down)
monitor=eDP-1, 1920x1080@60, 0x1080, 1.10

# --- PRESENTATION MODE (COLLEGE) ---
# When at college, comment the two lines above (add a #) 
# and uncomment the line below (remove the #)
# monitor=HDMI-A-1, preferred, auto, 1, mirror, eDP-1
